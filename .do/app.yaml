# DigitalOcean App Platform - LikeNew
# 1. Repo: ajusta github.repo / branch si no es Robertlin24/likenew main
# 2. DATABASE_URL: base en DigitalOcean Managed PostgreSQL → copia la "Connection string" del cluster
#    (Databases → tu DB → Connection details). Puerto suele ser 25060; añade ?sslmode=require si no viene en la URI.
#    Ponla solo en el servicio "backend" como SECRET (Settings del componente → Environment), o vincula la DB a la app
#    para que DO inyecte DATABASE_URL. Mismo dominio con ingress: no hace falta VITE_API_BASE_URL.

name: likenew
region: nyc
features:
  - buildpack-stack=ubuntu-22

services:
  - name: backend
    source_dir: app/app/backend
    github:
      repo: Robertlin24/likenew
      branch: main
      deploy_on_push: true
    environment_slug: python
    build_command: pip install -r requirements.txt
    run_command: uvicorn main:app --host 0.0.0.0 --port $PORT
    http_port: 8080
    instance_count: 1
    envs:
      - key: ENVIRONMENT
        value: prod
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      # DATABASE_URL debe añadirse como variable secreta en la consola de DigitalOcean
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10

  - name: frontend
    source_dir: app/app/frontend
    github:
      repo: Robertlin24/likenew
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: npm install && npm run build
    run_command: npm run preview -- --host 0.0.0.0 --port $PORT
    http_port: 4173
    instance_count: 1
    # Con ingress, el frontend y backend comparten la misma URL; no hace falta VITE_API_BASE_URL

ingress:
  rules:
    # Primero: /api va al backend (FastAPI)
    - match:
        path:
          prefix: /api
      component:
        name: backend
        preserve_path_prefix: true
    # Raíz (/) y el resto van al frontend (SPA)
    - match:
        path:
          prefix: /
      component:
        name: frontend
